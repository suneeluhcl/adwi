services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: suneel-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=True
      - ADWI_LOCAL_SECRET=${ADWI_LOCAL_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./open-webui-data:/app/backend/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: suneel-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Chicago
      - TZ=America/Chicago
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
      - ADWI_LOCAL_SECRET=${ADWI_LOCAL_SECRET:-}
    volumes:
      - ./n8n-data:/home/node/.n8n

  searxng:
    image: searxng/searxng:latest
    container_name: suneel-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - ./searxng-data:/etc/searxng

  # Phoenix is run natively from adwi/.venv (see bin/start-phoenix)
  # Docker image arizephoenix/phoenix is currently mispackaged; native venv is more reliable.

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: suneel-homeassistant
    restart: unless-stopped
    network_mode: host          # required for mDNS / device discovery
    privileged: true
    environment:
      - TZ=America/Chicago
    volumes:
      - ./homeassistant-data:/config

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: suneel-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - n8n

  # ── Monitoring Stack ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: suneel-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:latest
    container_name: suneel-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml

  promtail:
    image: grafana/promtail:latest
    container_name: suneel-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /Users/MAC/SuneelWorkSpace/logs:/mnt/logs:ro
      - /Users/MAC/SuneelWorkSpace/notes:/mnt/notes:ro
      - /tmp:/tmp:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: suneel-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"          # :4000 — avoids collision with Open WebUI :3000
    environment:
      - GF_SECURITY_ADMIN_USER=suneel
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-adwi-local}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:4000
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  node-exporter:
    image: prom/node-exporter:latest
    container_name: suneel-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: suneel-cadvisor
    restart: unless-stopped
    ports:
      - "9101:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
