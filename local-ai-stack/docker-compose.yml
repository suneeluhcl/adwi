services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: suneel-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=True
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./open-webui-data:/app/backend/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: suneel-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Chicago
      - TZ=America/Chicago
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./n8n-data:/home/node/.n8n

  searxng:
    image: searxng/searxng:latest
    container_name: suneel-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - ./searxng-data:/etc/searxng

  phoenix:
    image: arizephoenix/phoenix:version-8.1.0
    container_name: suneel-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"    # Phoenix UI
      - "4317:4317"    # OTLP gRPC collector
      - "4318:4318"    # OTLP HTTP collector
    environment:
      - PHOENIX_WORKING_DIR=/phoenix
    volumes:
      - ./phoenix-data:/phoenix

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: suneel-homeassistant
    restart: unless-stopped
    network_mode: host          # required for mDNS / device discovery
    privileged: true
    environment:
      - TZ=America/Chicago
    volumes:
      - ./homeassistant-data:/config

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: suneel-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - n8n
