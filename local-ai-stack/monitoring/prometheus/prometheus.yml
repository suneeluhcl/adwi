global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    host: 'adwi-mac'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Adwi Safe Command API (:5055) — /metrics endpoint added by adwi_metrics.py
  - job_name: 'adwi-command-api'
    static_configs:
      - targets: ['host.docker.internal:5055']
    metrics_path: /metrics
    scrape_interval: 30s

  # Adwi system process metrics via node-exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Docker container metrics via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s

  # Ollama — exposes /api/tags which we proxy through the safe-api metrics endpoint
  - job_name: 'ollama-health'
    static_configs:
      - targets: ['host.docker.internal:11434']
    metrics_path: /api/tags
    scrape_interval: 60s
